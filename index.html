<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortiToken Reporting - FortiFlex Token Verbrauch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .login-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            max-width: 500px;
        }

        .login-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-export {
            background: #48bb78;
            color: white;
            padding: 10px 15px;
            font-size: 13px;
        }

        .btn-export:hover {
            background: #38a169;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .success {
            background: #c6f6d5;
            color: #22543d;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .dashboard {
            display: none;
        }

        .dashboard-header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-header h2 {
            color: #333;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
        }

        .ou-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .ou-title {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ou-stats {
            font-size: 13px;
            color: #666;
        }

        .account-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .account-card:hover {
            background: #f0f2f5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .account-name {
            font-weight: 600;
            color: #333;
            font-size: 15px;
        }

        .account-id {
            color: #999;
            font-size: 12px;
        }

        .account-details {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }

        .account-points {
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            font-weight: 600;
            color: #48bb78;
            font-size: 14px;
            display: inline-block;
        }

        .config-list {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }

        .config-item {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 3px solid #764ba2;
            cursor: pointer;
            transition: all 0.3s;
        }

        .config-item:hover {
            background: #f5f5f5;
        }

        .config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .config-id {
            color: #999;
            font-size: 12px;
            margin-top: 3px;
        }

        .config-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-active {
            background: #c6f6d5;
            color: #22543d;
        }

        .entitlement-list {
            display: none;
            margin-top: 10px;
            padding-left: 20px;
            border-left: 2px solid #ddd;
            padding-top: 10px;
        }

        .entitlement-item {
            background: #fafafa;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 3px;
            font-size: 13px;
            border-left: 2px solid #48bb78;
        }

        .entitlement-serial {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .entitlement-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            color: #666;
            font-size: 12px;
        }

        .toggle-icon {
            display: inline-block;
            transition: transform 0.3s;
            font-size: 12px;
            color: #999;
        }

        .config-item.expanded .toggle-icon {
            transform: rotate(90deg);
        }

        .account-card.expanded .toggle-icon {
            transform: rotate(90deg);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #667eea;
            font-size: 28px;
            font-weight: 600;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .collapse-toggle {
            background: #f0f0f0;
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            cursor: pointer;
            display: inline-block;
            font-size: 14px;
            color: #333;
            transition: all 0.3s;
        }

        .collapse-toggle:hover {
            background: #e0e0e0;
        }

        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .export-buttons {
                width: 100%;
            }

            .btn-export {
                flex: 1;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .account-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔐 FortiToken Reporting</h1>
            <p>FortiFlex Token-Verbrauch und Verrechnung Übersicht</p>
        </div>

        <!-- Login Section -->
        <div id="loginSection" class="login-section">
            <h2>API-Anmeldedaten</h2>
            <div id="errorMessage" class="error"></div>
            <div id="successMessage" class="success"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Benutzername" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Passwort" required>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-primary">Anmelden</button>
                    <button type="button" class="btn-secondary" id="clearCookies">Cookies löschen</button>
                </div>
            </form>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Authentifizierung läuft...</p>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard" class="dashboard">
            <div class="dashboard-header">
                <h2>📊 Token Reporting Dashboard</h2>
                <div class="export-buttons">
                    <button class="btn-export" id="exportCSV">📥 CSV Export</button>
                    <button class="btn-export" id="exportPDF">📄 PDF Export</button>
                    <button class="btn-export" id="logout">🚪 Abmelden</button>
                </div>
            </div>

            <div id="statsContainer" class="stats-grid"></div>

            <div id="dataContainer"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
